name: Deploy to Firebase Hosting on PR
on: pull_request
permissions:
  checks: write
  contents: read
  pull-requests: write
jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cd front_end && npm install && npm run build
        env:
          REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL }}
          REACT_APP_supabase_endpoint: ${{ secrets.SUPABASE_ENDPOINT }}
          REACT_APP_supabase_api_key: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BOOKRATINGS_486201 }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BOOKRATINGS_486201 }}
          channelId: live
          projectId: bookratings-486201
          entryPoint: ./front_end
